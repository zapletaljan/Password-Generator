<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="card">
        <div class="card-header">
            <button class="btn" id="theme-switch-btn"><i class="fa-solid fa-moon"></i></button>
            <h1>Password Generator</h1>
        </div>

        <div class="card-options">

            <div class="options-l">
               
                <div class="card-input">
                    
                    <input id="password-length-input" type="number" min="8" max="64" value="12">
                    <label>Password length</label>

                </div>
               
                <div class="card-input">
                    
                    <input class="checkbox" id="allow-uppercase-checkbox" type="checkbox" name="checkbox">
                    <label>Uppercase letters</label>

                </div>
                
                <div class="card-input">

                    <input class="checkbox" id="allow-lowercase-checkbox" type="checkbox" name="checkbox">
                    <label>Lowercase letters</label>

                </div>
                
                <div class="card-input">

                    <input class="checkbox" id="allow-symbols-checkbox" type="checkbox" name="checkbox">
                    <label>Symbols</label>

                </div>
                
                <div class="card-input">

                    <input class="checkbox" id="allow-lookalike-checkbox" type="checkbox" name="checkbox">
                    <label>Look-alike letters</label>

                    <button class="btn" id="help-lookalike-btn"><i class="fa-solid fa-question"></i>
                        <p>Tick to include look-alike letters (1,l,i,0,o).</p>
                    </button>
                </div>
                <button class="generate-btn" id="generate-btn">Generate</button>
            </div>

            <div class="options-r">

            </div>


        </div>
        <div class="card-result">
            <h2>Your ultimate password</h2>
            <div class="password-container">
                <p class="password" id="password">D8q2NzP9xV4yL1mB7wK5jR3nC6vF8pT1gH9dZ2xM4bC6vN1pL9kQ3jW8mN2vB4zP</p><i class="fa-solid fa-copy"></i>
            </div>
            <p class="copy-p">Click to copy</p>
        </div>
    </div>
</body>

</html>
